<!-- SISÄLTÖ -->
<div class="container mt-5">

    <h1>Tehtävä 1 — Osa 2</h1>

    <!--JSON-->

    <div class="container mt-5">
    <div id="tulos"></div>
</div>

 <script>

// FUNKTIO
function kerro(data) {

    let nimet = "";

// SILMUKKA
    for (let i = 0; i < data.osallistujat.length; i++) {

        nimet += data.osallistujat[i];

        if (i < data.osallistujat.length - 1) {
            nimet += ", ";
        }
    }

 // HTML
    let html = `
        <h2>${data.toteutus}</h2>

        <img src="${data.kuva}" class="img-fluid mb-3" width="400">
        let html = `
    <img src="https://picsum.photos/400/250">
`;

        <p><strong>Osallistujien määrä:</strong> ${data.osallistujien_maara}</p>
        <p>${data.aika}</p>
        <p><strong>Kesto:</strong> ${data.kesto}</p>

        <p><strong>Osallistujat:</strong> ${nimet}</p>
    `;

    document.getElementById("tulos").innerHTML = html;
}


// JSON
fetch("tietue2.json")
    .then(response => response.json())
    .then(data => kerro(data))
    .catch(error => console.log("Virhe:", error));

</script>
