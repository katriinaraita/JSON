<!-- SISÄLTÖ -->
<div class="container mt-5">

    <h1>Tehtävä 1 — Osa 1</h1>
  

    <!-- JSON -->
    <div class="container mt-4">
    <h2>JSON</h2>
    <div id="tulos"></div>
</div>
    
    <script>

// 1. Hae JSON ja muuta objektiksi
fetch("tietue.json")
    .then(function(response) {
        return response.json();   // JSON → JavaScript objekti
    })
    .then(function(data) {

        console.log(data); // tarkistus

        kerro(data); // kutsutaan funktiota

    })
    .catch(function(error) {
        console.log("Virhe:", error);
    });


// 2. Kerro-funktio
function kerro(data) {

    let teksti = "";

    // Tulostetaan perustiedot
    teksti += "<h3>" + data.otsikko + "</h3>";
    teksti += "<p>" + data.kuvaus + "</p>";

    // 3. FOR-SILMUKKA (sisältölista)
    teksti += "<h4>Sisältö</h4><ul>";

    for (let i = 0; i < data.opintojakso.sisalto.length; i++) {
        teksti += "<li>" + data.opintojakso.sisalto[i] + "</li>";
    }

    teksti += "</ul>";

    document.getElementById("tulos").innerHTML = teksti;
}
        
</script>
