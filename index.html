<!-- Sisältö -->
<div class="container mt-5">

    <h1>Tehtävä 1 — Osa 1</h1>
  
    <!-- JSON -->
     
    <div class="container mt-4">
    <div id="tulos"></div>
</div>
    
    <script>

// Haetaan tiedosto
fetch("tietue.json")
    .then(function(response) {
        return response.json();   
    })
    .then(function(data) {

        console.log(data); 

        kerro(data); 

    })
    .catch(function(error) {
        console.log("Virhe:", error);
    });


// Funktio
function kerro(data) {

    let teksti = "";

    teksti += "<h2>" + data.otsikko + "</h2>";
    teksti += "<p>" + data.kuvaus + "</p>";
    teksti += "<img src='" + data.kuva + "' class='img-fluid mb-3' width='300'>";

    // Opintojakso
    teksti += "<h2>Opintojakso</h2>";
    teksti += "<p><strong>Nimi:</strong> " + data.opintojakso.nimi + "</p>";
    teksti += "<p><strong>Tunnus:</strong> " + data.opintojakso.tunnus + "</p>";
    teksti += "<p><strong>Opintopisteet:</strong> " + data.opintojakso.opintopisteet + "</p>";

    // Silmukka - Sisältö
    teksti += "<h4>Sisältö</h4><ul>";

    for (let i = 0; i < data.opintojakso.sisalto.length; i++) {
        teksti += "<li>" + data.opintojakso.sisalto[i] + "</li>";
    }

    teksti += "</ul>";

    //Silmukka - Tekniikat

    teksti += "<h3>Tekniikat</h3><ul>";

    for (let i = 0; i < data.tekniikat.length; i++) {
        teksti += "<li>" +
                  data.tekniikat[i].aihe +
                  " - <a href='" + data.tekniikat[i].linkki + "' target='_blank'>Linkki</a>" +
                  "</li>";
    }

    teksti += "</ul>";

    document.getElementById("tulos").innerHTML = teksti;
}

        
</script>
