<!-- SISÄLTÖ -->
<div class="container mt-5">

    <h1>Poke Haku</h1>

    <!-- Hakulaatikko -->
    <div class="mb-3">
    <input type="text" id="pokemonName" 
           placeholder="Enter Pokemon name"
     <button onclick="poke()">HAE</button>
</div>

    <!-- Kuvan paikka -->
    <div id="kuva"></div>

    <!-- Käännä-painike -->
    <button id="kaannaBtn" class="btn btn-warning mt-3"
            onclick="kaanna()" style="display:none;">
        Käännä
    </button>

    <!-- Lisätiedot -->
    <div id="lisatiedot" class="mt-3"></div>

</div>

    <script>

let nykyinenPokemon = null; 

// HAE
function poke() {

    let nimi = document.getElementById("pokemonName").value.toLowerCase();

    fetch("https://pokeapi.co/api/v2/pokemon/" + nimi)
        .then(response => response.json())
        .then(obj => {

            nykyinenPokemon = obj;   
            pokekuva(obj);           

            // Käännä
            document.getElementById("kaannaBtn").style.display = "inline-block";

            // Tyhjennetään hakukenttä
            document.getElementById("pokemonName").value = "";

        })
        .catch(error => {
            document.getElementById("kuva").innerHTML =
                "<p class='text-danger'>Pokemonia ei löytynyt</p>";
        });
}


// Etukuva
function pokekuva(obj) {

    document.getElementById("kuva").innerHTML =
        `<img src="${obj.sprites.front_default}" class="img-fluid">`;

}

        function kaanna() {

    let obj = nykyinenPokemon;

    // Takakuva
    document.getElementById("kuva").innerHTML =
        `<img src="${obj.sprites.back_default}" class="img-fluid">`;

    // lisätiedot
    let tiedot = `
        <h3>Ominaisuudet</h3>

        <p><strong>Pituus:</strong> ${obj.height}</p>
        <p><strong>Paino:</strong> ${obj.weight}</p>
        <p><strong>Tyyppi:</strong> ${obj.types.map(t => t.type.name).join(", ")}</p>
    `;

    document.getElementById("lisatiedot").innerHTML = tiedot;
}

</script>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
