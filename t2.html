<!-- sisältö -->

    
<div class="container mt-5">

    <h1>Poke Haku</h1>

   <input type="text" id="pokemonName" placeholder="Enter Pokemon name">
<button onclick="poke()">HAE</button>

<br><br>

<div id="kuva"></div>

<br>

<button id="kaannaBtn" onclick="kaanna()" style="display:none;">
    Käännä
</button>

<div id="lisatiedot"></div>

<script>

let nykyinenPokemon = null;

// Haku
function poke() {

    let nimi = document.getElementById("pokemonName").value.toLowerCase();

    fetch("https://pokeapi.co/api/v2/pokemon/" + nimi)
        .then(response => response.json())
        .then(obj => {

            nykyinenPokemon = obj;

            pokekuva(obj);

            document.getElementById("kaannaBtn").style.display = "inline";

            document.getElementById("pokemonName").value = "";

            document.getElementById("lisatiedot").innerHTML = "";

        })
        .catch(error => {
            document.getElementById("kuva").innerHTML =
                "Pokemonia ei löytynyt";
        });
}


// Kuva 1
function pokekuva(obj) {

    document.getElementById("kuva").innerHTML =
        "<img src='" + obj.sprites.front_default + "'>";

}


// Käännä
function kaanna() {

    let obj = nykyinenPokemon;

    document.getElementById("kuva").innerHTML =
        "<img src='" + obj.sprites.back_default + "'>";

    let tiedot = "<h3>Ominaisuudet</h3>" +
                 "<p>Pituus: " + obj.height + "</p>" +
                 "<p>Paino: " + obj.weight + "</p>" +
                 "<p>Tyyppi: " + obj.types[0].type.name + "</p>";

    document.getElementById("lisatiedot").innerHTML = tiedot;
}

</script>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
